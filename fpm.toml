name = "odeint"
version = "1.0.0"
license = "license"
author = "Thomas"
maintainer = "thomas.biekoetter@desy.de"
copyright = "Copyright 2025, Thomas"
[build]
auto-executables = true
auto-tests = true
auto-examples = true
module-naming = false
[install]
library = true
test = false
[fortran]
implicit-typing = false
implicit-external = false
source-form = "free"
[[test]]
name = "euler"
source-dir = "test"
main = "euler.f90"
[[test]]
name = "rk4"
source-dir = "test"
main = "rk4.f90"
[features]
debug.flags = "-fPIC -O0 -g "
debug.gfortran.flags = "-fbounds-check -fbacktrace -Wall -Wuninitialized -fmax-errors=1 -fcheck=all -ffpe-trap=invalid,zero,overflow"
debug.ifx.flags = "-check bounds -check pointer -traceback"
release.flags = "-O3"
release.gfortran.flags = "-march=native -fmax-errors=1 -ffixed-line-length-none -fno-range-check"
release.ifx.flags = "-xHost -march"
[profiles]
debug = ["debug"]
release = ["release"]


